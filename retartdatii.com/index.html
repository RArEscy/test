<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Galerie</title>

<style>

body{
background:#111;
font-family:Arial;
margin:0;
padding:10px;
}

#gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:15px;
}

.box{
background:#1b1b1b;
padding:10px;
border-radius:10px;
}

img,video{
width:100%;
border-radius:10px;
}

button{
position:fixed;
bottom:20px;
right:20px;
padding:15px;
font-size:20px;
border:none;
border-radius:50%;
cursor:pointer;
}

</style>
</head>

<body>

<div id="gallery"></div>

<button onclick="uploadFile()">+</button>

<script>

async function loadGallery(){

gallery.innerHTML = "";

for(let i=1;i<=1000;i++){

let video = document.createElement("video");

video.src = "videos/" + i + ".mp4";
video.controls = true;

video.onloadeddata = ()=>{

let box = document.createElement("div");
box.className = "box";

box.appendChild(video);

let img = document.createElement("img");
img.src = "images/" + i + ".png";

box.appendChild(img);

gallery.appendChild(box);

};

}

}

loadGallery();

async function uploadFile(){

let pass = prompt("PAROLA");

if(pass != "1234"){
alert("GRESIT");
return;
}

let input = document.createElement("input");
input.type = "file";

input.onchange = async ()=>{

let file = input.files[0];

let formData = new FormData();

formData.append("file", file);

await fetch("/upload", {
method:"POST",
body:formData
});

location.reload();

};

input.click();

}

</script>

</body>
</html>
